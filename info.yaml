yaml_version: 6

project:
  title:        "Grid Processor Oracle"
  description:  "Spatial Computing Oracle with Massively Parallel Architecture"
  author:       "Kaoru Aguilera Katayama"
  language:     "Verilog"
  clock_hz:     20000000
  tiles:        "1x1"          # Ojo: En la versión 6 se pone en formato string "1x1", no como lista

pinout:
  inputs:
    - "in_0 / D0"
    - "in_1 / D1"
    - "in_2 / D2"
    - "in_3 / D3"
    - "in_4 / D4"
    - "in_5 / D5"
    - "in_6 / D6"
    - "in_7 / D7"
  outputs:
    - "out_0 / Status LSB"
    - "out_1"
    - "out_2"
    - "out_3"
    - "out_4"
    - "out_5"
    - "out_6"
    - "out_7 / Status MSB"
  bidirectional:
    - "TRIGGER (uio_in)"
    - "SELECT (uio_in)"
    - "IRQ (uo_out)"
    - "READY (uo_out)"
    - "none"
    - "none"
    - "none"
    - "none"

documentation:
  how_it_works: "Spatial computing oracle with an 8x8 cellular automata grid utilizing Moore neighborhood totalistic logic for acceleration."
  how_to_test:  "Apply seed data on inputs, toggle trigger, and monitor ready/status pins for convergence outputs."
  instructor:   "Independent Architecture Submission"
  deploy_with_wokwi: false

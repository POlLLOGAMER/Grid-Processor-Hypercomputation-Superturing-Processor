# TinyTapeout project information
project:
  wokwi_id: 0  # HDL project, not Wokwi
  source_files:
    - grid_oracle.v
    - grid_cell.v
    - projection_buffer.v
    - bridge_fsm.v
  top_module: "tt_um_grid_oracle"

yaml_version: 4

documentation:
  author:      "Kaoru Aguilera Katayama"
  title:       "Grid Processor - Spatial Computing Oracle"
  language:    "Verilog"
  description: "8x8 cellular automaton grid processor with spatial oracle architecture. Massively parallel totalistic rule engine with Moore neighborhood topology, convergence detection, and 64-bit result projection buffer."

  how_it_works: |
    An 8x8 grid of 4-bit cells evolves under a totalistic rule with Moore neighborhood.
    The grid runs at clk/4. A projection buffer (depth 64) accumulates cell states and
    signals READY (uo_out_1) via majority-threshold collapse once convergence is detected
    (stable for convergence_threshold=3 consecutive iterations or timeout at 4096 cycles).
    Results are read out as 8-bit pages selected by SELECT (ui_in_1). An IRQ line
    (uo_out_0) fires when the result bank is ready for readout.

  how_to_test: |
    1. Assert rst_n low to reset all cells and state machines.
    2. Load 8-bit grid seed via in[7:0] and pulse TRIGGER (ui_in_0) high for 1 cycle.
    3. Wait for READY (uo_out_1) to go high, indicating convergence.
    4. Set SELECT (ui_in_1) = 0 to read result page 0 on out[7:0], then SELECT=1 for page 1, etc.
    5. IRQ (uo_out_0) pulses high for 1 cycle when each new result page is latched.
    6. Grid clock divider = 4, projection clock divider = 16, readout divider = 64.
    7. Nominal clock 20 MHz (50 ns period). Supply 1.8V.

  inputs:
    - clock
    - reset (active low, rst_n)
    - Grid seed / Data bus D2
    - Grid seed / Data bus D3
    - Grid seed / Data bus D4
    - Grid seed / Data bus D5
    - Grid seed / Data bus D6
    - Grid seed / Data bus D7

  outputs:
    - Result bit 0 / Status LSB
    - Result bit 1
    - Result bit 2
    - Result bit 3
    - Result bit 4
    - Result bit 5
    - Result bit 6
    - Result bit 7 / Status MSB

  bidirectional:
    - none
    - none
    - none
    - none
    - none
    - none
    - none
    - none

  tag:         "experiment, fpga, cellular automaton, parallel, grid"

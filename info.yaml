yaml_version: 6

project:
  title:        "Grid Processor Oracle"
  description:  "Spatial Computing Oracle with Massively Parallel Architecture"
  author:       "Kaoru Aguilera Katayama"
  language:     "Verilog"
  clock_hz:     20000000
  tiles:        "1x1"
  top_module:   "tt_um_grid_oracle"
  source_files:
    - tt_um_grid_oracle.sv
    - reset_synchronizer.sv
    - clock_divider.sv
    - grid_processor_core.sv
    - grid_cell.sv
    - bridge_quantizer.sv
    - adc_interface.sv
    - output_mux.sv
    - grid_cell_array.v
  top_module: "tt_um_grid_oracle"

pinout:
  ui[0]: "Grid seed bit 0 / Data bus D0"
  ui[1]: "Grid seed bit 1 / Data bus D1"
  ui[2]: "Grid seed bit 2 / Data bus D2"
  ui[3]: "Grid seed bit 3 / Data bus D3"
  ui[4]: "Grid seed bit 4 / Data bus D4"
  ui[5]: "Grid seed bit 5 / Data bus D5"
  ui[6]: "Grid seed bit 6 / Data bus D6"
  ui[7]: "Grid seed bit 7 / Data bus D7"

  uo[0]: "Result bit 0 / Status LSB"
  uo[1]: "Result bit 1"
  uo[2]: "Result bit 2"
  uo[3]: "Result bit 3"
  uo[4]: "Result bit 4"
  uo[5]: "Result bit 5"
  uo[6]: "Result bit 6"
  uo[7]: "Result bit 7 / Status MSB"

  uio[0]: "TRIGGER (uio_in)"
  uio[1]: "SELECT (uio_in)"
  uio[2]: "IRQ (uo_out)"
  uio[3]: "READY (uo_out)"
  uio[4]: "none"
  uio[5]: "none"
  uio[6]: "none"
  uio[7]: "none"

documentation:
  how_it_works: "Spatial computing oracle with an 8x8 cellular automata grid utilizing Moore neighborhood totalistic logic for acceleration."
  how_to_test:  "Apply seed data on inputs, toggle trigger, and monitor ready/status pins for convergence outputs."
  instructor:   "Independent Architecture Submission"
  deploy_with_wokwi: false

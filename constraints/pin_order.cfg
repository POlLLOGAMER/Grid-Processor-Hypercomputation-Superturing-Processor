# Pin Order — TinyTapeout 7 auto-routing
# Format: pin_name  direction

# Standard TT7 interface (top edge)
ui_clk        input
ui_rstb       input
ui_in[0]      input
ui_in[1]      input
ui_in[2]      input
ui_in[3]      input
ui_in[4]      input
ui_in[5]      input
ui_in[6]      input
ui_in[7]      input
uo_out[0]     output
uo_out[1]     output
uo_out[2]     output
uo_out[3]     output
uo_out[4]     output
uo_out[5]     output
uo_out[6]     output
uo_out[7]     output

# User I/O (side edge)
uio_in        input
uio_oe        output
uio_out       output

# SFR interface (RP2040 SPI)
sclk          input
srstb         input
sf_rd_en      input
sf_wr_en      output
sf_rdata[0]   input
sf_rdata[1]   input
sf_rdata[2]   input
sf_rdata[3]   input
sf_rdata[4]   input
sf_rdata[5]   input
sf_rdata[6]   input
sf_rdata[7]   input
sf_wdata[0]   output
sf_wdata[1]   output
sf_wdata[2]   output
sf_wdata[3]   output
sf_wdata[4]   output
sf_wdata[5]   output
sf_wdata[6]   output
sf_wdata[7]   output

# Power / ground
vccd1         power
vccd2         power
vssd1         ground
vssd2         ground
